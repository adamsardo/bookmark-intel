{ title: “Claude Ambassador Program”, author: “@claudeai”, url: “https://x.com/claudeai/status/2029999626926076179”, insight: “You applied for this. Track it.”, tag: “personal” },
{ title: “OpenAI Built Platform Without Code”, author: “@peterfriese”, url: “https://x.com/peterfriese/status/2025375002263257288”, insight: “Entire platform via Codex agents. Zero manual code. The future is here.”, tag: “news” },
{ title: “Monologue Team & Design”, author: “@naveennaidu_m”, url: “https://x.com/naveennaidu_m/status/2023900749860585691”, insight: “How they built the iOS app with the right designer + studio collab.”, tag: “inspo” },
],
},
];

const ACTIONS = [
{ id: 1, text: “Prototype with Hume TADA or Fish Audio S2 for Couch voice”, category: “couch-tech”, urgency: “now” },
{ id: 2, text: “Apply to a16z Speedrun Alpha”, category: “funding”, urgency: “now” },
{ id: 3, text: “Find + apply to AU $15M pre-seed fund”, category: “funding”, urgency: “now” },
{ id: 4, text: “Grab the $500K startup bundle”, category: “funding”, urgency: “now” },
{ id: 5, text: “Set up Claude/Codex debate skill for code review”, category: “dev-tools”, urgency: “next” },
{ id: 6, text: “Implement autonomous dogfooding for QA”, category: “dev-tools”, urgency: “next” },
{ id: 7, text: “Build Anthropic’s 1-person marketing playbook”, category: “gtm”, urgency: “next” },
{ id: 8, text: “Test Clay Ads for MedReport outreach”, category: “gtm”, urgency: “next” },
{ id: 9, text: “Post dog mRNA story with AI-in-healthcare take”, category: “vibes”, urgency: “next” },
{ id: 10, text: “Drop the shadcn onboarding component into Couch”, category: “design”, urgency: “next” },
];

const URGENCY_MAP = { now: { label: “THIS WEEK”, color: “#FF6B35” }, next: { label: “NEXT SPRINT”, color: “#8B5CF6” } };

const LS_KEY = “bookmark-intel-actions”;

function App() {
const [activeCategory, setActiveCategory] = useState(null);
const [actions, setActions] = useState(() => {
try {
const saved = localStorage.getItem(LS_KEY);
if (saved) {
const parsed = JSON.parse(saved);
return ACTIONS.map(a => ({ ...a, done: parsed[a.id] || false }));
}
} catch {}
return ACTIONS.map(a => ({ ...a, done: false }));
});
const [view, setView] = useState(“dashboard”);
const [searchQuery, setSearchQuery] = useState(””);
const [expandedItem, setExpandedItem] = useState(null);

useEffect(() => {
try {
const obj = {};
actions.forEach(a => { obj[a.id] = a.done; });
localStorage.setItem(LS_KEY, JSON.stringify(obj));
} catch {}
}, [actions]);

const toggleAction = (id) => {
setActions(prev => prev.map(a => a.id === id ? { ...a, done: !a.done } : a));
};

const completedCount = actions.filter(a => a.done).length;
const totalCount = actions.length;
const totalBookmarks = CATEGORIES.reduce((sum, c) => sum + c.items.length, 0);

const filteredCategories = searchQuery
? CATEGORIES.map(c => ({
...c,
items: c.items.filter(i =>
i.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
i.insight.toLowerCase().includes(searchQuery.toLowerCase()) ||
i.author.toLowerCase().includes(searchQuery.toLowerCase()) ||
i.tag.toLowerCase().includes(searchQuery.toLowerCase())
),
})).filter(c => c.items.length > 0)
: CATEGORIES;

const activeData = activeCategory ? CATEGORIES.find(c => c.id === activeCategory) : null;

const s = {
wrap: { maxWidth: 960, margin: “0 auto”, padding: “0 28px” },
mono: { fontFamily: “‘JetBrains Mono’, monospace” },
};

return (
<div>
<div style={{ padding: “32px 28px 0”, ...s.wrap.padding ? {} : {}, maxWidth: 960, margin: “0 auto”, paddingLeft: 28, paddingRight: 28, paddingTop: 32 }}>
<div style={{ display: “flex”, justifyContent: “space-between”, alignItems: “flex-start”, flexWrap: “wrap”, gap: 16, marginBottom: 8 }}>
<div>
<h1 style={{ fontSize: 28, fontWeight: 700, margin: 0, letterSpacing: “-0.5px”, color: “#fff” }}>bookmark intel</h1>
<p style={{ margin: “6px 0 0”, fontSize: 14, color: “#666”, ...s.mono }}>{totalBookmarks} saves · {CATEGORIES.length} categories · {completedCount}/{totalCount} actions done</p>
</div>
<div style={{ display: “flex”, gap: 8 }}>
{[“dashboard”, “actions”].map(v => (
<button key={v} onClick={() => { setView(v); setActiveCategory(null); }} style={{
padding: “8px 16px”, borderRadius: 8, border: “1px solid “ + (view === v ? “#333” : “#1a1a1a”),
background: view === v ? “#1a1a1a” : “transparent”, color: view === v ? “#fff” : “#666”,
fontSize: 13, fontWeight: 500, cursor: “pointer”, ...s.mono, textTransform: “uppercase”, letterSpacing: “0.5px”, transition: “all 0.2s”,
}}>{v}</button>
))}
</div>
</div>
<div style={{ margin: “20px 0 24px”, background: “#151517”, borderRadius: 6, height: 6, overflow: “hidden” }}>
<div style={{ height: “100%”, width: (completedCount / totalCount * 100) + “%”, background: “linear-gradient(90deg, #FF6B35, #22C55E)”, borderRadius: 6, transition: “width 0.5s cubic-bezier(0.4, 0, 0.2, 1)” }} />
</div>
{view === “dashboard” && !activeCategory && (
<div style={{ marginBottom: 24 }}>
<input type=“text” placeholder=“search bookmarks...” value={searchQuery} onChange={e => setSearchQuery(e.target.value)} style={{
width: “100%”, padding: “12px 16px”, borderRadius: 10, border: “1px solid #222”, background: “#111113”,
color: “#E8E8E8”, fontSize: 14, ...s.mono, outline: “none”, boxSizing: “border-box”,
}} />
</div>
)}
</div>

  <div style={{ maxWidth: 960, margin: "0 auto", padding: "0 28px 40px" }}>
    {view === "dashboard" && !activeCategory && (
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 12 }}>
        {filteredCategories.map(cat => (
          <button key={cat.id} onClick={() => { setActiveCategory(cat.id); setSearchQuery(""); }}
            style={{ background: "#111113", border: "1px solid #1a1a1c", borderRadius: 14, padding: 20, cursor: "pointer", textAlign: "left", transition: "all 0.25s cubic-bezier(0.4, 0, 0.2, 1)", position: "relative", overflow: "hidden" }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = cat.color + "44"; e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 8px 32px " + cat.color + "11"; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = "#1a1a1c"; e.currentTarget.style.transform = "translateY(0)"; e.currentTarget.style.boxShadow = "none"; }}>
            <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 2, background: cat.color, opacity: 0.6 }} />
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <span style={{ fontSize: 24 }}>{cat.emoji}</span>
              <span style={{ fontSize: 11, ...s.mono, color: cat.color, background: cat.color + "15", padding: "3px 8px", borderRadius: 4, fontWeight: 500, letterSpacing: "0.3px" }}>{cat.priority}</span>
            </div>
            <h3 style={{ margin: "0 0 4px", fontSize: 16, fontWeight: 600, color: "#fff" }}>{cat.label}</h3>
            <p style={{ margin: 0, fontSize: 13, color: "#888", lineHeight: 1.4 }}>{cat.description}</p>
            <div style={{ marginTop: 14, fontSize: 12, color: "#555", ...s.mono }}>{cat.items.length} bookmark{cat.items.length !== 1 ? "s" : ""}</div>
          </button>
        ))}
      </div>
    )}

    {view === "dashboard" && activeCategory && activeData && (
      <div>
        <button onClick={() => setActiveCategory(null)} style={{ background: "none", border: "none", color: "#666", fontSize: 13, cursor: "pointer", padding: "0 0 16px", ...s.mono, display: "flex", alignItems: "center", gap: 6 }}>&larr; all categories</button>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 6 }}>
          <span style={{ fontSize: 28 }}>{activeData.emoji}</span>
          <h2 style={{ margin: 0, fontSize: 24, fontWeight: 700, color: "#fff" }}>{activeData.label}</h2>
          <span style={{ fontSize: 11, ...s.mono, color: activeData.color, background: activeData.color + "15", padding: "4px 10px", borderRadius: 5, fontWeight: 500 }}>{activeData.priority}</span>
        </div>
        <p style={{ margin: "0 0 24px", fontSize: 14, color: "#666" }}>{activeData.description}</p>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {activeData.items.map((item, idx) => {
            const key = activeCategory + "-" + idx;
            return (
              <div key={idx} style={{ background: "#111113", border: "1px solid #1a1a1c", borderRadius: 12, overflow: "hidden", transition: "border-color 0.2s" }}
                onMouseEnter={e => e.currentTarget.style.borderColor = "#2a2a2c"} onMouseLeave={e => e.currentTarget.style.borderColor = "#1a1a1c"}>
                <div onClick={() => setExpandedItem(expandedItem === key ? null : key)} style={{ padding: "14px 18px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                      <span style={{ fontSize: 14, fontWeight: 500, color: "#fff" }}>{item.title}</span>
                      <span style={{ fontSize: 10, ...s.mono, color: "#555", background: "#1a1a1c", padding: "2px 6px", borderRadius: 3 }}>{item.tag}</span>
                    </div>
                    <span style={{ fontSize: 12, color: "#555", ...s.mono }}>{item.author}</span>
                  </div>
                  <span style={{ fontSize: 16, color: "#444", transform: expandedItem === key ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.2s", flexShrink: 0, marginLeft: 8 }}>{"\u25BE"}</span>
                </div>
                {expandedItem === key && (
                  <div style={{ padding: "0 18px 16px", borderTop: "1px solid #1a1a1c" }}>
                    <p style={{ margin: "12px 0", fontSize: 13, color: "#aaa", lineHeight: 1.6 }}>{item.insight}</p>
                    <a href={item.url} target="_blank" rel="noopener noreferrer" style={{
                      display: "inline-flex", alignItems: "center", gap: 6, padding: "7px 14px", borderRadius: 7,
                      background: activeData.color + "18", color: activeData.color, fontSize: 12, ...s.mono, fontWeight: 500,
                      textDecoration: "none", border: "1px solid " + activeData.color + "30", transition: "all 0.2s",
                    }}>open &nearr;</a>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    )}

    {view === "actions" && (
      <div>
        <div style={{ marginBottom: 24 }}>
          <h2 style={{ margin: "0 0 4px", fontSize: 20, fontWeight: 700, color: "#fff" }}>action items</h2>
          <p style={{ margin: 0, fontSize: 13, color: "#666", ...s.mono }}>{completedCount}/{totalCount} complete &middot; derived from your bookmarks</p>
        </div>
        {["now", "next"].map(urgency => (
          <div key={urgency} style={{ marginBottom: 28 }}>
            <div style={{ display: "inline-flex", alignItems: "center", gap: 6, marginBottom: 12, padding: "4px 10px", borderRadius: 5, background: URGENCY_MAP[urgency].color + "15" }}>
              <div style={{ width: 6, height: 6, borderRadius: "50%", background: URGENCY_MAP[urgency].color }} />
              <span style={{ fontSize: 11, ...s.mono, color: URGENCY_MAP[urgency].color, fontWeight: 600, letterSpacing: "0.5px" }}>{URGENCY_MAP[urgency].label}</span>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {actions.filter(a => a.urgency === urgency).map(action => {
                const cat = CATEGORIES.find(c => c.id === action.category);
                return (
                  <button key={action.id} onClick={() => toggleAction(action.id)} style={{
                    display: "flex", alignItems: "center", gap: 14, padding: "14px 18px", background: "#111113",
                    border: "1px solid #1a1a1c", borderRadius: 10, cursor: "pointer", textAlign: "left", width: "100%",
                    transition: "all 0.2s", opacity: action.done ? 0.45 : 1,
                  }} onMouseEnter={e => e.currentTarget.style.borderColor = "#2a2a2c"} onMouseLeave={e => e.currentTarget.style.borderColor = "#1a1a1c"}>
                    <div style={{
                      width: 20, height: 20, borderRadius: 6, border: "2px solid " + (action.done ? "#22C55E" : "#333"),
                      background: action.done ? "#22C55E" : "transparent", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.2s",
                    }}>{action.done && <span style={{ color: "#000", fontSize: 12, fontWeight: 700 }}>{"\u2713"}</span>}</div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <span style={{ fontSize: 14, color: action.done ? "#666" : "#E8E8E8", textDecoration: action.done ? "line-through" : "none", fontWeight: 400 }}>{action.text}</span>
                    </div>
                    {cat && <span style={{ fontSize: 10, ...s.mono, color: cat.color, background: cat.color + "12", padding: "3px 8px", borderRadius: 4, flexShrink: 0, whiteSpace: "nowrap" }}>{cat.emoji} {cat.label}</span>}
                  </button>
                );
              })}
            </div>
          </div>
        ))}
      </div>
    )}
  </div>
</div>

);
}

ReactDOM.createRoot(document.getElementById(“root”)).render(<App />);
</script>

</body>
</html>
